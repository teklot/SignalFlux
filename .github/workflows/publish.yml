name: Publish

on:
  push:
    tags: [v*]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: latest

      - name: Restore
        run: dotnet restore SignalFlux.slnx

      - name: Build
        run: dotnet build SignalFlux.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack SignalFlux.slnx --configuration Release --no-build

      - name: NuGet login (OIDC → temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages to NuGet.org
        run: dotnet nuget push '**/*.nupkg' --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
